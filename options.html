<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <title>Pin to All Windows</title>
    <style>
      html {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-width: 300px;
        padding: 16px;
      }

      h1 {
        font-size: 16px;
        margin: 0 0 12px;
      }

      label {
        align-items: flex-start;
        display: flex;
        gap: 10px;
        line-height: 1.4;
        margin: 10px 0;
      }

      input {
        margin-top: 3px;
      }

      p {
        color: CanvasText;
        font-size: 12px;
        margin: 12px 0 0;
        opacity: 0.72;
      }

      #status {
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <h1>Pin to All Windows</h1>
    <fieldset>
      <legend>Mode</legend>
      <label>
        <input name="pin-mode" type="radio" value="shared">
        <span>Mode 1 – Shared State</span>
      </label>
      <label>
        <input name="pin-mode" type="radio" value="duplicate">
        <span>Mode 2 – Duplicate</span>
      </label>
    </fieldset>
    <p id="mode-description"></p>
    <p id="status" role="status"></p>
    <script src="options.js"></script>
  </body>
</html>
